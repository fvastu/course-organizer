<svg xmlns="http://www.w3.org/2000/svg" width="1365" height="935" viewBox="0 0 1365 935" fill="none">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4F91CD"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E67E22"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#71A94A"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F1B400"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9D9D9D"/>
    </marker>
  </defs>

  <rect width="1365" height="935" fill="#E6E6E6"/>

  <line x1="110" y1="120" x2="110" y2="900" stroke="#A6A6A6" stroke-width="5"/>
  <line x1="430" y1="120" x2="430" y2="900" stroke="#A6A6A6" stroke-width="5"/>
  <line x1="760" y1="120" x2="760" y2="900" stroke="#A6A6A6" stroke-width="5"/>
  <line x1="980" y1="120" x2="980" y2="900" stroke="#000" stroke-width="6"/>
  <line x1="1240" y1="120" x2="1240" y2="900" stroke="#A6A6A6" stroke-width="5"/>

  <g>
    <ellipse cx="110" cy="70" rx="90" ry="34" fill="#4F91CD"/>
    <rect x="20" y="70" width="180" height="70" fill="#4F91CD"/>
    <ellipse cx="110" cy="140" rx="90" ry="34" fill="#4F91CD"/>
    <text x="110" y="103" text-anchor="middle" fill="white" font-family="Arial" font-size="38">workspace</text>
  </g>

  <g>
    <ellipse cx="430" cy="70" rx="90" ry="34" fill="#E67E22"/>
    <rect x="340" y="70" width="180" height="70" fill="#E67E22"/>
    <ellipse cx="430" cy="140" rx="90" ry="34" fill="#E67E22"/>
    <text x="430" y="103" text-anchor="middle" fill="white" font-family="Arial" font-size="38">staging</text>
  </g>

  <g>
    <ellipse cx="760" cy="70" rx="95" ry="34" fill="#71A94A"/>
    <rect x="665" y="70" width="190" height="70" fill="#71A94A"/>
    <ellipse cx="760" cy="140" rx="95" ry="34" fill="#71A94A"/>
    <text x="760" y="90" text-anchor="middle" fill="white" font-family="Arial" font-size="36">Local</text>
    <text x="760" y="124" text-anchor="middle" fill="white" font-family="Arial" font-size="36">repository</text>
  </g>

  <g>
    <ellipse cx="1240" cy="70" rx="88" ry="34" fill="#F1B400"/>
    <rect x="1152" y="70" width="176" height="70" fill="#F1B400"/>
    <ellipse cx="1240" cy="140" rx="88" ry="34" fill="#F1B400"/>
    <text x="1240" y="90" text-anchor="middle" fill="white" font-family="Arial" font-size="36">Remote</text>
    <text x="1240" y="124" text-anchor="middle" fill="white" font-family="Arial" font-size="36">repository</text>
  </g>

  <line x1="110" y1="250" x2="420" y2="250" stroke="#4F91CD" stroke-width="38" marker-end="url(#arrowBlue)"/>
  <text x="268" y="262" text-anchor="middle" fill="white" font-family="Arial" font-size="40">git add/mv/rm</text>

  <line x1="430" y1="310" x2="742" y2="310" stroke="#E67E22" stroke-width="38" marker-end="url(#arrowOrange)"/>
  <text x="586" y="322" text-anchor="middle" fill="white" font-family="Arial" font-size="40">git commit</text>

  <line x1="110" y1="370" x2="742" y2="370" stroke="#4F91CD" stroke-width="38" marker-end="url(#arrowBlue)"/>
  <text x="426" y="382" text-anchor="middle" fill="white" font-family="Arial" font-size="40">git commit -a</text>

  <line x1="430" y1="450" x2="110" y2="450" stroke="#E67E22" stroke-width="38" marker-end="url(#arrowOrange)"/>
  <text x="270" y="462" text-anchor="middle" fill="white" font-family="Arial" font-size="40">git reset &lt;file&gt;</text>

  <line x1="760" y1="540" x2="110" y2="540" stroke="#71A94A" stroke-width="38" marker-end="url(#arrowGreen)"/>
  <text x="436" y="552" text-anchor="middle" fill="white" font-family="Arial" font-size="40">git reset &lt;commit&gt;</text>

  <line x1="110" y1="620" x2="430" y2="620" stroke="#9D9D9D" stroke-width="38" marker-end="url(#arrowGray)"/>
  <text x="270" y="632" text-anchor="middle" fill="white" font-family="Arial" font-size="40">git diff</text>

  <line x1="110" y1="680" x2="760" y2="680" stroke="#9D9D9D" stroke-width="38" marker-end="url(#arrowGray)"/>
  <text x="436" y="692" text-anchor="middle" fill="white" font-family="Arial" font-size="40">git diff HEAD</text>

  <line x1="760" y1="480" x2="1218" y2="480" stroke="#71A94A" stroke-width="38" marker-end="url(#arrowGreen)"/>
  <text x="990" y="492" text-anchor="middle" fill="white" font-family="Arial" font-size="40">git push</text>

  <line x1="1240" y1="620" x2="782" y2="620" stroke="#F1B400" stroke-width="38" marker-end="url(#arrowYellow)"/>
  <text x="1010" y="632" text-anchor="middle" fill="white" font-family="Arial" font-size="40">git fetch</text>

  <line x1="1240" y1="780" x2="110" y2="780" stroke="#F1B400" stroke-width="38" marker-end="url(#arrowYellow)"/>
  <text x="675" y="792" text-anchor="middle" fill="white" font-family="Arial" font-size="44">git clone/pull</text>
</svg>
